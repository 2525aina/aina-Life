name: Firebase Deploy

on:
  push:
    branches:
      - main
      - stg
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Create .env.production file
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "${{ secrets.ENV_FILE_PROD }}" > .env.production
          elif [ "${{ github.ref_name }}" = "stg" ]; then
            echo "${{ secrets.ENV_FILE_STG }}" > .env.production
          else
            echo "${{ secrets.ENV_FILE_DEV }}" > .env.production
          fi

      - name: Build project
        run: npm run build

      - name: Install jq (for parsing JSON)
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Deploy full Firebase project (SSR対応)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > $GOOGLE_APPLICATION_CREDENTIALS
          firebase use ${{ github.ref_name == 'main' && 'aina-life-prod' || github.ref_name == 'stg' && 'aina-life-stg' || 'aina-life-dev' }}
          firebase deploy \
            --only hosting,firestore,indexes,storage,functions \
            --project "$(jq -r '.project_id' $GOOGLE_APPLICATION_CREDENTIALS)" \
            --non-interactive --force