name: Firebase Deploy

on:
  push:
    branches:
      - main
      - stg
      - dev
    paths-ignore:
      - '**/*.md'
      - '**/.gitignore'
      - 'script/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14.20.0

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production file
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "${{ secrets.ENV_FILE_PROD }}" > .env.production
          elif [ "${{ github.ref_name }}" = "stg" ]; then
            echo "${{ secrets.ENV_FILE_STG }}" > .env.production
          else
            echo "${{ secrets.ENV_FILE_DEV }}" > .env.production
          fi

      - name: Build project
        run: npm run build

      - name: Deploy full Firebase project (SSR対応)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/gcp-key.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > $GOOGLE_APPLICATION_CREDENTIALS
          firebase experiments:enable webframeworks

          if [ "${{ github.ref_name }}" = "main" ]; then
            PROJECT_ID="aina-life-prod"
          elif [ "${{ github.ref_name }}" = "stg" ]; then
            PROJECT_ID="aina-life-stg"
          else
            PROJECT_ID="aina-life-dev"
          fi

          firebase deploy \
            --only hosting,firestore,indexes,storage,functions \
            --project $PROJECT_ID \
            --non-interactive --force